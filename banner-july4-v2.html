<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy July 4th — Tafsol Technologies</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

  .banner {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 30%, #0d1f4a 0%, #060d1f 50%, #020810 100%);
  }

  /* ─── CANVAS FIREWORKS ─────────────────────────────────────── */
  #canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
  }

  /* ─── STARS LAYER ──────────────────────────────────────────── */
  .stars-layer {
    position: absolute;
    inset: 0;
    z-index: 1;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: var(--o1); transform: scale(1); }
    to   { opacity: var(--o2); transform: scale(1.4); }
  }

  /* ─── AURORA GLOW ──────────────────────────────────────────── */
  .aurora {
    position: absolute;
    inset: 0;
    z-index: 2;
    background:
      radial-gradient(ellipse 900px 300px at 50% 80%, rgba(180,20,20,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 700px 250px at 20% 60%, rgba(20,60,180,0.1) 0%, transparent 70%),
      radial-gradient(ellipse 700px 250px at 80% 60%, rgba(20,60,180,0.1) 0%, transparent 70%);
    animation: auroraShift 6s ease-in-out infinite alternate;
  }
  @keyframes auroraShift {
    from { opacity: 0.6; }
    to   { opacity: 1; }
  }

  /* ─── SKYLINE ──────────────────────────────────────────────── */
  .skyline {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 6;
  }

  /* ─── FLAG ─────────────────────────────────────────────────── */
  .flag-wrap {
    position: absolute;
    top: 70px;
    right: 70px;
    width: 210px;
    height: 114px;
    z-index: 8;
    opacity: 0.65;
    transform-origin: left center;
  }
  .flag-svg {
    width: 100%;
    height: 100%;
    animation: waveFlag 2s ease-in-out infinite;
    transform-origin: left center;
  }
  @keyframes waveFlag {
    0%   { clip-path: polygon(0 5%,50% 0%,100% 5%,100% 95%,50% 100%,0 95%); }
    25%  { clip-path: polygon(0 0%,50% 6%,100% 0%,100% 100%,50% 94%,0 100%); }
    50%  { clip-path: polygon(0 5%,50% 0%,100% 5%,100% 95%,50% 100%,0 95%); }
    75%  { clip-path: polygon(0 0%,50% 6%,100% 0%,100% 100%,50% 94%,0 100%); }
    100% { clip-path: polygon(0 5%,50% 0%,100% 5%,100% 95%,50% 100%,0 95%); }
  }

  /* ─── FLAGPOLE ─────────────────────────────────────────────── */
  .flagpole {
    position: absolute;
    top: 60px;
    right: 276px;
    width: 4px;
    height: 200px;
    background: linear-gradient(180deg, #d4af37 0%, #b8922e 100%);
    z-index: 8;
    border-radius: 2px;
  }
  .pole-ball {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 14px;
    background: radial-gradient(circle at 35% 35%, #ffe066, #d4af37);
    border-radius: 50%;
  }

  /* ─── SHOOTING STARS ───────────────────────────────────────── */
  .shoot {
    position: absolute;
    height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0), #fff 60%, rgba(255,255,255,0));
    border-radius: 2px;
    animation: shootAcross var(--sd) ease-in infinite;
    animation-delay: var(--ss);
    opacity: 0;
    z-index: 4;
  }
  @keyframes shootAcross {
    0%   { opacity: 0; transform: translateX(-100px) translateY(0) rotate(var(--sa)); width: 0; }
    10%  { opacity: 1; width: var(--sw); }
    80%  { opacity: 0.8; }
    100% { opacity: 0; transform: translateX(400px) translateY(60px) rotate(var(--sa)); width: var(--sw); }
  }

  /* ─── CONFETTI ─────────────────────────────────────────────── */
  .confetti-piece {
    position: absolute;
    width: 8px;
    height: 14px;
    top: -20px;
    animation: fall var(--fd) linear infinite;
    animation-delay: var(--fs);
    z-index: 9;
    border-radius: 2px;
    opacity: 0.85;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0.9; }
    100% { transform: translateY(1120px) rotate(720deg); opacity: 0; }
  }

  /* ─── MAIN TEXT ────────────────────────────────────────────── */
  .content {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    padding-bottom: 170px;
  }

  .label-top {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 18px;
    letter-spacing: 10px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    margin-bottom: 16px;
    animation: fadeSlideDown 1.2s ease forwards;
    opacity: 0;
  }

  .happy-text {
    font-family: 'Oswald', sans-serif;
    font-size: 110px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 8px;
    text-transform: uppercase;
    text-shadow:
      0 0 20px rgba(255,255,255,0.5),
      0 0 60px rgba(200,220,255,0.3);
    animation: fadeSlideDown 1s ease 0.2s forwards;
    opacity: 0;
    line-height: 1;
  }

  .july-text {
    font-family: 'Playfair Display', serif;
    font-size: 145px;
    font-weight: 900;
    background: linear-gradient(135deg, #ff4444 0%, #ff6b6b 30%, #ffcc00 55%, #ff4444 80%, #cc0000 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    filter: drop-shadow(0 0 30px rgba(255,60,60,0.6)) drop-shadow(0 0 60px rgba(255,60,60,0.3));
    animation: fadeSlideUp 1s ease 0.4s forwards, pulseGlow 3s ease-in-out 1.4s infinite alternate;
    opacity: 0;
  }
  @keyframes pulseGlow {
    from { filter: drop-shadow(0 0 20px rgba(255,60,60,0.5)) drop-shadow(0 0 50px rgba(255,60,60,0.2)); }
    to   { filter: drop-shadow(0 0 40px rgba(255,100,100,0.9)) drop-shadow(0 0 80px rgba(255,60,60,0.5)); }
  }

  .fourth-text {
    font-family: 'Oswald', sans-serif;
    font-size: 88px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 24px;
    text-transform: uppercase;
    text-shadow:
      0 0 30px rgba(255,255,255,0.4),
      0 0 80px rgba(100,140,255,0.3);
    animation: fadeSlideUp 1s ease 0.6s forwards;
    opacity: 0;
    line-height: 1;
    margin-top: -8px;
  }

  .year-text {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 26px;
    letter-spacing: 18px;
    color: rgba(255,220,80,0.9);
    text-transform: uppercase;
    margin-top: 18px;
    animation: fadeSlideUp 1s ease 0.8s forwards;
    opacity: 0;
  }

  /* ─── DIVIDER ──────────────────────────────────────────────── */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 22px 0;
    animation: fadeIn 1s ease 1s forwards;
    opacity: 0;
  }
  .div-line {
    width: 140px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,220,80,0.7), transparent);
  }
  .div-star {
    color: #ffcc00;
    font-size: 18px;
  }

  /* ─── TAGLINE ──────────────────────────────────────────────── */
  .tagline {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 20px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase;
    animation: fadeIn 1s ease 1.1s forwards;
    opacity: 0;
  }

  /* ─── BRAND BAR ────────────────────────────────────────────── */
  .brand-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 130px;
    background: linear-gradient(180deg, transparent 0%, rgba(2,8,16,0.95) 40%, rgba(2,8,16,1) 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 60px;
    z-index: 15;
  }
  .brand-left {
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .brand-icon {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, #1a3a8f, #2a5fd6);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    box-shadow: 0 0 20px rgba(42,95,214,0.5);
  }
  .brand-name {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #fff;
    letter-spacing: 1px;
  }
  .brand-sub {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .brand-right {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-align: right;
    text-transform: uppercase;
  }
  .brand-right span {
    display: block;
    font-size: 16px;
    color: rgba(255,220,80,0.8);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: none;
    margin-top: 2px;
  }

  /* ─── ANIMATIONS ───────────────────────────────────────────── */
  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ─── SPARKLE DOTS ─────────────────────────────────────────── */
  .sparkle {
    position: absolute;
    border-radius: 50%;
    animation: sparklePop var(--sp) ease-in-out infinite;
    animation-delay: var(--sd2);
    z-index: 7;
  }
  @keyframes sparklePop {
    0%,100% { transform: scale(0); opacity: 0; }
    50%      { transform: scale(1); opacity: 1; }
  }

  /* ─── STARS BANNER (top) ───────────────────────────────────── */
  .stars-stripe {
    position: absolute;
    top: 60px;
    left: 60px;
    display: flex;
    gap: 12px;
    z-index: 8;
    animation: fadeIn 1.5s ease 1.5s forwards;
    opacity: 0;
  }
  .stripe-star {
    color: rgba(255,220,80,0.7);
    font-size: 16px;
    animation: rotateStar 4s linear infinite;
  }
  .stripe-star:nth-child(2) { animation-delay: 0.3s; }
  .stripe-star:nth-child(3) { animation-delay: 0.6s; }
  .stripe-star:nth-child(4) { animation-delay: 0.9s; }
  .stripe-star:nth-child(5) { animation-delay: 1.2s; }
  @keyframes rotateStar {
    from { transform: rotate(0deg) scale(1); }
    50%  { transform: rotate(180deg) scale(1.3); }
    to   { transform: rotate(360deg) scale(1); }
  }
</style>
</head>
<body>
<div class="banner" id="banner">

  <!-- Stars -->
  <div class="stars-layer" id="stars"></div>

  <!-- Aurora glow -->

  <!-- Canvas fireworks -->

  <!-- Confetti -->

  <!-- Shooting stars -->
  <div class="shoot" style="--sd:3s;--ss:0.5s;--sa:-20deg;--sw:180px;top:18%;left:10%"></div>

  <div class="flag-wrap">

      <!-- Stars (simplified) -->

        <text x="14" y="19">★</text><text x="28" y="19">★</text><text x="42" y="19">★</text><text x="56" y="19">★</text>
        <text x="7"  y="28">★</text><text x="21" y="28">★</text><text x="35" y="28">★</text><text x="49" y="28">★</text><text x="63" y="28">★</text>
        <text x="14" y="37">★</text><text x="28" y="37">★</text><text x="42" y="37">★</text><text x="56" y="37">★</text>
        <text x="7"  y="46">★</text><text x="21" y="46">★</text><text x="35" y="46">★</text><text x="49" y="46">★</text><text x="63" y="46">★</text>
        <text x="14" y="55">★</text><text x="28" y="55">★</text><text x="42" y="55">★</text><text x="56" y="55">★</text>
      </g>
    </svg>
  </div>

  <!-- Top star row -->
  <div class="stars-stripe">
    <span class="stripe-star">★</span>
    <span class="stripe-star">★</span>
    <span class="stripe-star">★</span>
    <span class="stripe-star">★</span>
    <span class="stripe-star">★</span>
  </div>

  <!-- Main content -->
  <div class="content">
    <div class="label-top">Tafsol Technologies Presents</div>
    <div class="happy-text">HAPPY</div>
    <div class="july-text">July</div>
    <div class="fourth-text">4<span style="font-size:48px;letter-spacing:4px;vertical-align:super;font-family:Inter,sans-serif;font-weight:300">th</span></div>
    <div class="year-text">★ &nbsp; 2026 &nbsp; ★</div>
    <div class="divider">
      <div class="div-line"></div>
      <span class="div-star">✦</span>
      <div class="div-line"></div>
    </div>
    <div class="tagline">Independence Day</div>
  </div>

  <!-- Skyline SVG -->
  <svg class="skyline" viewBox="0 0 1080 320" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs>
      <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0d1a3a" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#020810" stop-opacity="1"/>

      <linearGradient id="buildGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a2a50"/>

    <rect x="0" y="240" width="1080" height="80" fill="url(#skyGrad)"/>

    <rect x="995" y="175" width="85"  height="145" fill="url(#buildGrad)"/>
    <!-- Window lights -->
    <g fill="rgba(255,240,150,0.4)" opacity="0.7">
      <rect x="70"  y="170" width="6"  height="5" rx="1"/>
      <rect x="82"  y="180" width="6"  height="5" rx="1"/>
      <rect x="165" y="145" width="7"  height="5" rx="1"/>
      <rect x="178" y="160" width="7"  height="5" rx="1"/>
      <rect x="270" y="155" width="8"  height="5" rx="1"/>
      <rect x="285" y="168" width="8"  height="5" rx="1"/>

      <rect x="630" y="130" width="9"  height="5" rx="1"/>
      <rect x="648" y="145" width="9"  height="5" rx="1"/>

      <rect x="845" y="195" width="8"  height="5" rx="1"/>

    <!-- Statue of Liberty (left area) -->
    <g transform="translate(400,95)" fill="#1a2a50">
      <!-- Base/pedestal -->
      <rect x="-18" y="130" width="36" height="20" rx="2"/>
      <rect x="-12" y="110" width="24" height="22" rx="2"/>
      <!-- Body -->
      <rect x="-10" y="60"  width="20" height="55" rx="3"/>

      <polygon points="0,-2 -4,12 4,12"/>
      <polygon points="-8,2 -14,14 -4,14"/>
      <polygon points="8,2 14,14 4,14"/>
      <polygon points="-12,8 -17,18 -8,18"/>
      <polygon points="12,8 17,18 8,18"/>
      <!-- Torch arm -->
      <rect x="10"  y="72" width="5"  height="25" rx="2" transform="rotate(-20,12,85)"/>

      <rect x="22"  y="48" width="7"  height="15" rx="3"/>

  <!-- Brand bar -->

<script>
// ─── STARS BACKGROUND ────────────────────────────────────────────────────────
const starsLayer = document.getElementById('stars');
for (let i = 0; i < 180; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random()*75}%;
    left:${Math.random()*100}%;
    --d:${(Math.random()*3+1.5).toFixed(1)}s;
    --o1:${(Math.random()*0.3+0.1).toFixed(2)};
    --o2:${(Math.random()*0.5+0.4).toFixed(2)};
    animation-delay:${(Math.random()*4).toFixed(1)}s;
  `;
  starsLayer.appendChild(s);
}

// ─── CONFETTI ─────────────────────────────────────────────────────────────────
const confettiEl = document.getElementById('confetti');
const colors = ['#ff3333','#ffffff','#3366ff','#ffcc00','#ff6666','#99bbff'];
for (let i = 0; i < 60; i++) {
  const c = document.createElement('div');
  c.className = 'confetti-piece';
  c.style.cssText = `
    left:${Math.random()*100}%;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    --fd:${(Math.random()*4+3).toFixed(1)}s;
    --fs:${(Math.random()*5).toFixed(1)}s;
    transform:rotate(${Math.random()*360}deg);
    width:${Math.random()*6+4}px;
    height:${Math.random()*10+8}px;
  `;
  confettiEl.appendChild(c);
}

// ─── CANVAS FIREWORKS ─────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 7 + 2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.alpha = 1;
    this.decay = Math.random() * 0.015 + 0.008;
    this.size = Math.random() * 3 + 1.5;
    this.gravity = 0.12;
    this.trail = [];
  }
  update() {
    this.trail.push({x: this.x, y: this.y, a: this.alpha * 0.4});
    if (this.trail.length > 6) this.trail.shift();
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.97;
    this.vy *= 0.97;
    this.alpha -= this.decay;
  }
  draw() {
    // Draw trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      ctx.save();
      ctx.globalAlpha = t.a * (i / this.trail.length);
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.size * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
      ctx.restore();
    }
    // Draw particle
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.restore();
  }
}

class Firework {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * 900 + 90;
    this.y = canvas.height;
    this.tx = Math.random() * 860 + 110;
    this.ty = Math.random() * 480 + 60;
    const angle = Math.atan2(this.ty - this.y, this.tx - this.x);
    const speed = Math.random() * 10 + 14;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.alive = true;
    this.exploded = false;
    this.particles = [];
    // Color palette — patriotic + vivid
    const palettes = [
      ['#ff4444','#ff6666','#ff8888','#ffaaaa'],
      ['#4466ff','#6688ff','#88aaff','#aaccff'],
      ['#ffdd00','#ffee44','#ffff88','#ffffcc'],
      ['#ffffff','#eeeeff','#ccddff','#aabbdd'],
      ['#ff44aa','#ff66cc','#ff88dd','#ffaaee'],
      ['#44ffdd','#66ffee','#88ffff','#aaeeee'],
      ['#ff8800','#ffaa22','#ffcc44','#ffee88'],
      ['#aa44ff','#cc66ff','#dd88ff','#eeaaff'],
    ];
    this.palette = palettes[Math.floor(Math.random() * palettes.length)];
    this.size = Math.random() * 2 + 2;
    this.trail = [];
    this.delay = Math.random() * 2000;
    this.launched = false;
    setTimeout(() => { this.launched = true; }, this.delay);
  }
  update() {
    if (!this.launched || !this.alive) return;
    if (!this.exploded) {
      this.trail.push({x: this.x, y: this.y});
      if (this.trail.length > 8) this.trail.shift();
      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.18;
      if (this.vy >= 0 || Math.abs(this.x - this.tx) < 10) {
        this.explode();
      }
    } else {
      this.particles.forEach(p => p.update());
      this.particles = this.particles.filter(p => p.alpha > 0.02);
      if (this.particles.length === 0) this.reset();
    }
  }
  explode() {
    this.exploded = true;
    const count = Math.floor(Math.random() * 80 + 100);
    for (let i = 0; i < count; i++) {
      const color = this.palette[Math.floor(Math.random() * this.palette.length)];
      this.particles.push(new Particle(this.x, this.y, color));
    }
    // Flash
    ctx.save();
    ctx.beginPath();
    ctx.arc(this.x, this.y, 30, 0, Math.PI * 2);
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 30);
    g.addColorStop(0, 'rgba(255,255,255,0.9)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }
  draw() {
    if (!this.launched || !this.alive) return;
    if (!this.exploded) {
      // Rocket trail
      for (let i = 0; i < this.trail.length; i++) {
        const t = this.trail[i];
        ctx.save();
        ctx.globalAlpha = (i / this.trail.length) * 0.7;
        ctx.beginPath();
        ctx.arc(t.x, t.y, this.size * (i / this.trail.length), 0, Math.PI * 2);
        ctx.fillStyle = '#ffffaa';
        ctx.shadowColor = '#ffcc44';
        ctx.shadowBlur = 6;
        ctx.fill();
        ctx.restore();
      }
      ctx.save();
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size + 1, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = '#ffeeaa';
      ctx.shadowBlur = 12;
      ctx.fill();
      ctx.restore();
    } else {
      this.particles.forEach(p => p.draw());
    }
  }
}

// Launch fireworks
const fireworks = [];
for (let i = 0; i < 14; i++) {
  fireworks.push(new Firework());
}

function animate() {
  ctx.fillStyle = 'rgba(2, 8, 16, 0.18)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  fireworks.forEach(f => { f.update(); f.draw(); });
  requestAnimationFrame(animate);
}
animate();

// ─── SPARKLE DOTS ─────────────────────────────────────────────────────────────
const banner = document.getElementById('banner');
const sparkleColors = ['#ff4444','#ffffff','#4466ff','#ffcc00','#ff88cc'];
for (let i = 0; i < 25; i++) {
  const sp = document.createElement('div');
  sp.className = 'sparkle';
  const size = Math.random() * 6 + 3;
  sp.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random()*80}%;
    left:${Math.random()*100}%;
    background:${sparkleColors[Math.floor(Math.random()*sparkleColors.length)]};
    box-shadow: 0 0 ${size*2}px currentColor;
    --sp:${(Math.random()*2+1).toFixed(1)}s;
    --sd2:${(Math.random()*3).toFixed(1)}s;
  `;
  banner.appendChild(sp);
}
</script>
